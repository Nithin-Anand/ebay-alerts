# eBay Alerts — search definitions
# Each entry is one saved search. See docs/searches.md for the field reference.
# Manual edits here take effect on the next restart. Searches can also be
# managed from the web UI (http://localhost:8787), which applies changes
# immediately — but note the UI rewrites this file on save, so comments
# (including these) are lost the first time you save from the UI.

