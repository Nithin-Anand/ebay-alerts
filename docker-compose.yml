services:
  ebay-alerts:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override OLLAMA_URL here if your Ollama runs as a separate Docker service.
      # host.docker.internal resolves to the Docker host on Mac/Windows.
      # On Linux, use the host's IP or add `extra_hosts: ["host.docker.internal:host-gateway"]`
      OLLAMA_URL: http://host.docker.internal:11434
    ports:
      # Web UI for monitoring and editing searches. No authentication —
      # bind to 127.0.0.1 (as below) or a LAN-only interface, never the internet.
      - "127.0.0.1:8787:8787"
    volumes:
      # Read-write: the web UI persists search edits back to this file
      - ./searches.yaml:/app/searches.yaml
      # SQLite state lives outside the container so it survives rebuilds and restarts
      - ./data:/data
